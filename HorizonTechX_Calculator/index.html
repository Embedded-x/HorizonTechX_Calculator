<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">
        Dark Mode
    </button>

    <div class="calculator">

        <input
            type="text"
            id="display"
            readonly
        >

        <button id = "copy-btn">
            Copy
        </button>

        <div class="buttons">

            <button>C</button>
            <button>⌫</button>
            <button>%</button>
            <button>/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>

            <button>0</button>
            <button>.</button>
            <button>=</button>

        </div>

        <div class="history">
            <h3>History</h3>

            <button id="clear-history">
                Clear 
            </button>

            <ul id="history-list"></ul>
        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
